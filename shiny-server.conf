run_as shiny;

preserve_logs true;
log_dir /var/log/shiny-server;

# Generous timeouts for heavy bioinformatics computations
app_init_timeout 300;
app_idle_timeout 1800;

server {
  listen 3838;

  # Serve the entire repo as a site directory.
  # Shiny Server auto-discovers any subdirectory containing
  # app.R or server.R/ui.R and serves it as a Shiny app.
  # Everything else (site/, images, etc.) is served as static files.
  location / {
    site_dir /srv/shiny-server/phenosuite;
    directory_index on;
  }
}
